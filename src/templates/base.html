<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}SignCasa{% endblock %}</title>

    <!-- Tailwind CSS (self-hosted) -->
    <script src="/static/js/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a',
                            300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b',
                            600: '#d97706', 700: '#b45309', 800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>

    <!-- htmx (self-hosted) -->
    <script src="/static/js/htmx.min.js"></script>

    <!-- Alpine.js (self-hosted) -->
    <script defer src="/static/js/alpine.min.js"></script>

    <!-- Lucide Icons (self-hosted) -->
    <script src="/static/js/lucide.min.js"></script>

    {% block head %}{% endblock %}

    <style>
        [x-cloak] { display: none !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .touch-action-none {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .signature-canvas { cursor: crosshair; }
        @media (hover: none) and (pointer: coarse) {
            .signature-canvas { cursor: default; }
        }
        .btn-touch { min-height: 48px; }

        {% block styles %}{% endblock %}
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% block body %}{% endblock %}

    <!-- Initialize Lucide icons -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
        document.body.addEventListener('htmx:afterSwap', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
