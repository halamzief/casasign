{# Consent Modal - Identity confirmation and document review #}
<div x-data="{
    identityConfirmed: false,
    contractReviewed: false,
    get canProceed() { return this.identityConfirmed && this.contractReviewed },
    handleSubmit() {
        if (!this.canProceed) return;
        this.$dispatch('consent-done', { identity_confirmed: true, contract_reviewed: true });
    }
}" class="consent-modal">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-emerald-100 flex items-center justify-center">
                <i data-lucide="file-check" class="w-8 h-8 text-emerald-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">
                Dokument prüfen und bestätigen
            </h2>
            <p class="text-gray-600">
                Bitte bestätigen Sie die folgenden Punkte, um fortzufahren.
            </p>
        </div>

        <!-- Required Consents -->
        <div class="space-y-4 mb-8">
            <label class="flex items-start gap-3 cursor-pointer p-4 rounded-lg border-2 transition-colors"
                :class="identityConfirmed ? 'border-emerald-400 bg-emerald-50' : 'border-gray-200 hover:border-gray-300'">
                <input type="checkbox" x-model="identityConfirmed"
                    class="mt-0.5 w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500" required>
                <div class="flex-1">
                    <div class="font-medium text-gray-900">
                        Ich bestätige meine Identität als
                        <strong x-text="contractData?.signer_name || ''"></strong>
                    </div>
                </div>
            </label>

            <label class="flex items-start gap-3 cursor-pointer p-4 rounded-lg border-2 transition-colors"
                :class="contractReviewed ? 'border-emerald-400 bg-emerald-50' : 'border-gray-200 hover:border-gray-300'">
                <input type="checkbox" x-model="contractReviewed"
                    class="mt-0.5 w-5 h-5 rounded border-gray-300 text-emerald-600 focus:ring-emerald-500" required>
                <div class="flex-1">
                    <div class="font-medium text-gray-900">
                        Ich habe das Dokument gelesen und verstanden
                    </div>
                </div>
            </label>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <a href="/datenschutz" target="_blank" class="text-sm text-gray-600 hover:text-gray-900">
                Datenschutz
            </a>
            <div class="flex-1"></div>
            <button type="button"
                @click="handleSubmit()"
                :disabled="!canProceed"
                :class="!canProceed ? 'opacity-50 cursor-not-allowed' : 'hover:bg-emerald-700'"
                class="px-6 py-3 bg-emerald-600 text-white rounded-lg font-semibold transition-colors btn-touch">
                Weiter zur Unterschrift
            </button>
        </div>
    </div>
</div>
