{# Contract Viewer - PDF mode HTML display #}
<div class="contract-viewer bg-gray-50 min-h-screen">
    <style>
        .contract-content h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 1rem; }
        .contract-content h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .contract-content h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; margin-top: 1rem; }
        .contract-content p { margin-bottom: 0.75rem; color: #374151; line-height: 1.625; }
        .contract-content ul, .contract-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .contract-content li { margin-bottom: 0.5rem; }
        .contract-content strong { font-weight: 600; color: #1f2937; }
        .contract-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .contract-content th, .contract-content td { border: 1px solid #d1d5db; padding: 0.5rem 1rem; text-align: left; }
        .contract-content th { background-color: #f3f4f6; font-weight: 600; }
    </style>

    <!-- Header -->
    <div class="bg-white border-b sticky top-0 z-10 px-6 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold text-gray-900">{{ document_title or 'Dokument' }}</h1>
            <p class="text-sm text-gray-600 mt-1">{{ property_address or '' }}</p>
        </div>
    </div>

    <!-- Contract Content -->
    <div class="max-w-4xl mx-auto px-6 py-8">
        <div class="contract-content">
            {{ contract_html|safe }}
        </div>

        <!-- Scroll indicator -->
        <div class="mt-8 text-center text-sm text-gray-500">
            Scrollen Sie nach unten, um das vollständige Dokument zu lesen
        </div>
    </div>
</div>
