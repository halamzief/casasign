{# Kautionsversicherung - Subtle info card #}
<div x-data="kautionUpsellData({ kautionBetrag: {{ kaution_betrag or 0 }} })"
     class="bg-white border border-slate-200 rounded-xl p-5 transition-all"
     :class="interested ? 'ring-1 ring-amber-300' : ''">

    <div class="flex items-start gap-3 mb-4">
        <div class="w-9 h-9 bg-amber-50 rounded-lg flex items-center justify-center flex-shrink-0">
            <i data-lucide="piggy-bank" class="w-4.5 h-4.5 text-amber-600"></i>
        </div>
        <div class="flex-1">
            <h3 class="text-sm font-semibold text-slate-700">Kautionsversicherung</h3>
            <p class="text-xs text-slate-400 mt-0.5">Behalten Sie Ihr Geld auf dem Konto</p>
        </div>
    </div>

    <!-- Comparison -->
    <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 text-center p-3 rounded-lg bg-slate-50">
            <div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">Bar zahlen</div>
            <div class="text-base font-bold text-slate-700" x-text="formatCurrency(kautionBetrag)"></div>
            <div class="text-[10px] text-slate-400">einmalig</div>
        </div>
        <div class="text-xs text-slate-300 font-medium">oder</div>
        <div class="flex-1 text-center p-3 rounded-lg bg-slate-50"
             :class="interested ? 'ring-1 ring-amber-300 bg-amber-50' : ''">
            <div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">Versicherung</div>
            <div class="text-base font-bold text-amber-600" x-text="formatCurrency(monthlyRate)"></div>
            <div class="text-[10px] text-slate-400">pro Monat</div>
        </div>
    </div>

    <!-- Benefits (compact) -->
    <div class="grid grid-cols-2 gap-x-3 gap-y-1 mb-4 text-xs text-slate-500">
        <div class="flex items-center gap-1.5">
            <i data-lucide="check" class="w-3 h-3 text-amber-500"></i>
            <span>Geld bleibt verfügbar</span>
        </div>
        <div class="flex items-center gap-1.5">
            <i data-lucide="check" class="w-3 h-3 text-amber-500"></i>
            <span>Sofortige Bürgschaft</span>
        </div>
        <div class="flex items-center gap-1.5">
            <i data-lucide="check" class="w-3 h-3 text-amber-500"></i>
            <span>98 % Akzeptanz</span>
        </div>
        <div class="flex items-center gap-1.5">
            <i data-lucide="check" class="w-3 h-3 text-amber-500"></i>
            <span>Jederzeit kündbar</span>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-between">
        <span class="text-[10px] text-slate-300">via kautionsfrei.de</span>
        <div class="flex gap-2">
            <button type="button" @click="handleLearnMore()"
                class="px-3 py-1.5 text-xs font-medium text-slate-500 bg-slate-50 border border-slate-200
                       rounded-lg hover:bg-slate-100 transition-colors">
                Mehr erfahren
            </button>
            <button type="button" @click="toggleInterest()"
                :class="interested
                    ? 'bg-amber-500 hover:bg-amber-600 text-white'
                    : 'bg-white hover:bg-amber-50 text-amber-600 border border-amber-300'"
                class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors">
                <span x-text="interested ? 'Ausgewählt' : 'Interessiert'"></span>
            </button>
        </div>
    </div>

    <template x-if="interested">
        <p class="text-[10px] text-slate-400 mt-3 text-center leading-relaxed">
            Nach der Vertragsunterzeichnung erhalten Sie weitere Informationen.
            Kein Abschluss ohne Ihre Zustimmung.
        </p>
    </template>
</div>

<script>
function kautionUpsellData(config = {}) {
    return {
        kautionBetrag: config.kautionBetrag || 0,
        interested: false,

        get monthlyRate() {
            return this.kautionBetrag ? Math.round(this.kautionBetrag * 0.005) : 15;
        },

        formatCurrency(amount) {
            return new Intl.NumberFormat('de-DE', {
                style: 'currency', currency: 'EUR',
                minimumFractionDigits: 0, maximumFractionDigits: 0
            }).format(amount);
        },

        toggleInterest() {
            this.interested = !this.interested;
            this.$dispatch('kaution-interest-change', { interested: this.interested });
        },

        handleLearnMore() {
            window.open(
                'https://www.kautionsfrei.de/?utm_source=signcasa&utm_medium=kaution_upsell&utm_campaign=signing_flow',
                '_blank', 'noopener,noreferrer'
            );
        }
    };
}
</script>
