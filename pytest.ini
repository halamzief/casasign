[pytest]
# Pytest configuration for FES signature service

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    e2e: End-to-end tests with Playwright
    mobile: Mobile-specific tests
    admin: Admin UI tests
    slow: Tests that take a long time to run

# Async support
asyncio_mode = auto

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term

# Test results directory
junit_family = xunit2

# Log output
log_cli = false
log_cli_level = INFO
