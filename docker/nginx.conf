# Nginx configuration for SSE support in Docker

server {
    listen 80;
    server_name sign.signcasa.de;

    # SSE-specific configuration
    location /api/sign/status/ {
        proxy_pass http://backend:9000;

        # CRITICAL: Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;

        # SSE headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Timeouts for long-lived connections
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable nginx buffering (CRITICAL for SSE)
        proxy_set_header X-Accel-Buffering no;
    }

    # Regular API routes
    location /api/ {
        proxy_pass http://backend:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts for API
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Frontend
    location / {
        proxy_pass http://frontend:5175;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (for Vite HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
